<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Precios PAMI - Buscador de Medicamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💊 Buscador de Medicamentos PAMI</h1>
        <p>Precios actualizados - Lo que pagás como afiliado</p>
        
        <input type="text" id="buscador" placeholder="Buscá por droga, marca o laboratorio...">
        
        <!-- Filtros y orden -->
        <div class="filtros-container">
            <div class="filtro-grupo">
                <label>Presentación:</label>
                <select id="filtroPresentacion">
                    <option value="">Todas</option>
                </select>
            </div>
            
            <div class="filtro-grupo">
                <label>Laboratorio:</label>
                <select id="filtroLaboratorio">
                    <option value="">Todos</option>
                </select>
            </div>
            
            <div class="filtro-grupo">
                <label>Ordenar por precio:</label>
                <select id="ordenPrecio">
                    <option value="">Sin orden</option>
                    <option value="asc">💰 Más barato primero</option>
                    <option value="desc">💰 Más caro primero</option>
                </select>
            </div>
        </div>
        
        <div id="contador" class="contador"></div>
        
        <div id="resultados" class="resultados">
            <div class="mensaje-inicial">
                🔍 Buscá un medicamento para ver los resultados
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
